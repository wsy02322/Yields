rpc:
  # Public archive-capable endpoint used for this one-shot historical pull.
  # Re-runs / refreshes require an explicit user request.
  url: "https://eth.drpc.org"
  timeout_seconds: 45

sampling:
  # UTC daily snapshots at ~00:00; block is estimated then refined.
  interval: daily
  timezone: UTC
  # Trailing windows computed for every vault.
  # Includes 7d (Mellow/EarnETH weekly API) and 14d (Lido EarnETH UI label).
  rolling_days: [7, 14, 30, 90]

# Shared calendar windows applied to every vault that has data covering the start.
# "since_earneth" aligns both vaults to EarnETH's deployment date (not a ranking).
shared_windows:
  - label: since_earneth
    start_date: "2026-02-02"
    note: "From Lido EarnETH deployment through latest snapshot; applied to both vaults independently."

# Official UI / API display metadata used for comparison (not for ranking).
official_apy:
  lido_earn_eth:
    ui_url: "https://stake.lido.fi/earn/eth/deposit"
    ui_label: "APY* (14d avg.)"
    ui_window_days: 14
    api_url: "https://api.mellow.finance/v1/vaults"
    api_vault_id: "lido-earn-eth"
    api_window_days: 7
    api_window_field: "apr_breakdown[0].time_range"  # 604800s = 7d
    api_value_field: "apy"
    notes:
      - "Lido UI text says 14d avg.; product config apy.type=weekly and Mellow API time_range=7d."
      - "Compare our 7d hold APY to Mellow API; also report 14d for the UI label."
  fluid_lite_eth:
    ui_url: "https://fluid.io/lite/1"
    ui_label: "Net APY"
    ui_window_days: null
    methodology: spot_projected
    api_url: "https://api.instadapp.io/v2/mainnet/lite/users/0x0000000000000000000000000000000000000000/vaults"
    api_vault: "0xA0D3707c569ff8C87FA923d3823eC5D81c98Be78"
    net_field: "apy.apyWithoutFee"   # Net after 20% perf fee (= Gross * 0.8)
    gross_field: "apy.apyWithFee"    # Gross before perf fee
    notes:
      - "Official Net APY is a point-in-time projection from current lending/leverage rates, not a trailing share-price window."
      - "apyWithoutFee is Net (user); apyWithFee is Gross; Net ≈ Gross * (1 - 20%)."
      - "No official trailing window to mirror; compare spot Net vs our trailing hold APYs for context only."

vaults:
  fluid_lite_eth:
    name: Fluid Lite ETH Vault
    receipt_token: "0xA0D3707c569ff8C87FA923d3823eC5D81c98Be78"
    receipt_symbol: iETHv2
    standard: erc4626
    underlying_asset: "0xae7ab96520DE3A18E5e111B5EaAb095312D7fE84"  # stETH
    deployment_block: 19240555
    deployment_date: "2024-02-16"
    # Fees (source: lite.guides.instadapp.io/information/fees)
    fees:
      performance_fee: 0.20          # already reflected in share price / Net APY
      exit_fee: 0.0005               # charged on withdraw; included in realized APY
      management_fee: 0.0
    # Primary APY assumes user eventually withdraws (exit fee applied once at end).
    assume_final_withdraw: true
    offchain_rewards: []

  lido_earn_eth:
    name: Lido EarnETH
    vault: "0x6a37725ca7f4CE81c004c955f7280d5C704a249e"
    share_token: "0xBBFC8683C8fE8cF73777feDE7ab9574935fea0A4"
    share_symbol: earnETH
    oracle: "0xAda1f4c24603aB2fe5aBd35BCD12370e98A20358"
    fee_manager: "0xed4Fac879eE86F3aB0101993A3713e7cAA0488E1"
    base_asset: "0xEeeeeEeeeEeEeeEeEeEeeEEEeeeeEeeeeeeeEEeE"  # ETH
    deployment_block: 24370480
    deployment_date: "2026-02-02"
    # Fees (source: stake.lido.fi + on-chain FeeManager, D6 precision)
    fees:
      protocol_fee: 0.01             # 1% platform / management; minted as shares on oracle reports
      performance_fee: 0.10          # 10%; minted as shares on oracle reports
      deposit_fee: 0.0               # confirmed on-chain depositFeeD6=0
      redeem_fee: 0.0                # confirmed on-chain redeemFeeD6=0
    # Share price already net of protocol + performance fees.
    assume_final_withdraw: true
    # Listed separately; NOT included in main APY.
    offchain_rewards:
      - name: Mellow Points
        note: Accrue to depositor; visible on Mellow Dashboard; not in share price.
      - name: Obol rewards
        note: Claimable separately; not in share price.
      - name: SSV rewards
        note: Claimable separately; not in share price.